<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/88207c0f65.js" crossorigin="anonymous"></script>
</head>
<body class="bg-gradient-to-br from-gray-50 to-gray-100">
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div
            class="absolute -top-40 -right-40 w-80 h-80 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob">
        </div>
        <div
            class="absolute -bottom-40 -left-40 w-80 h-80 bg-purple-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-pink-200 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000">
        </div>
    </div>
    <div id="loginPage" class="min-h-screen flex items-center justify-center p-4 relative">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 sm:p-8 relative overflow-hidden card-shine">
            <div
                class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-br from-blue-400 to-purple-400 rounded-bl-full opacity-10">
            </div>
            <div
                class="absolute bottom-0 left-0 w-24 h-24 bg-gradient-to-tr from-green-400 to-blue-400 rounded-tr-full opacity-10">
            </div>
            <div class="text-center mb-8 relative">
                <div
                    class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center transform rotate-3 hover:rotate-6 transition-transform duration-300 shadow-lg float-animation">
                    <i class="fa-brands fa-github text-white text-4xl"></i>
                </div>
                <h1 class="text-2xl sm:text-3xl font-bold">
                    <span class="text-gradient">GitHub Issues Tracker</span>
                </h1>
                <p class="text-gray-600 mt-2">Sign in to manage your issues</p>
            </div>
            <form id="loginForm" class="space-y-6">
                <div class="group">
                    <label
                        class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-blue-600 transition-colors">Username</label>
                    <div class="relative">
                        <i
                            class="fa-regular fa-user absolute left-3 top-3.5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="username" value="admin"
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm hover:shadow-md"
                            placeholder="Enter Username">
                    </div>
                    <p class="text-xs font-medium text-blue-600 mt-1">Default: admin</p>
                </div>
                <div class="group">
                    <label
                        class="block text-sm font-bold text-gray-700 mb-2 group-focus-within:text-blue-600 transition-colors">Password</label>
                    <div class="relative">
                        <i
                            class="fa-solid fa-lock absolute left-3 top-3.5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="password" id="password" value="admin123"
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition shadow-sm hover:shadow-md"
                            placeholder="Enter Password">
                    </div>
                    <p class="text-xs font-medium text-blue-600 mt-1">Default: admin123</p>
                </div>
                <button type="submit"
                    class="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-700 hover:to-purple-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 flex items-center justify-center gap-2 shadow-md hover:shadow-xl pulse-glow">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Sign In
                </button>
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white font-medium text-gray-500">OR</span>
                    </div>
                </div>
                <div class="flex flex-col justify-center items-center">
                    <p class="text-sm font-medium text-gray-700 mb-3">Demo Credentials:</p>
                    <div
                        class="bg-gradient-to-r from-gray-50 to-gray-100 flex flex-col items-center rounded-lg p-4 border border-gray-200 space-y-2 w-full text-gray-600 shadow-inner">
                        <div class="flex items-center">
                            <i class="fa-regular fa-user text-blue-500 mr-2"></i>
                            <p><span class="font-mono font-bold px-2 py-1">Username :</span>admin</p>
                        </div>
                        <div class="flex items-center">
                            <i class="fa-solid fa-lock text-purple-500 mr-2"></i>
                            <p><span class="font-mono font-bold px-2 py-1">Password :</span>admin123</p>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
